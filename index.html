<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>LusTV - Catálogo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.png" class="logo">

    <nav>
        <a onclick="mudarAba('filmes')">🎬 Filmes</a>
        <a onclick="mudarAba('series')">📺 Séries</a>
        <a onclick="mudarAba('documentarios')">🎥 Documentários</a>
        <a onclick="mudarAba('animes')">🎌 Animes</a>
        <a id="show-favorites">❤️ Favoritos</a>
    </nav>

    <div class="controls">
        <input type="text" id="search" placeholder="Buscar...">
    </div>
</header>

<!-- Seção Filmes -->
<h2 id="filmes">🎬 Filmes</h2>
<div id="movies-container" class="container"></div>

<!-- Seção Séries -->
<h2 id="series">📺 Séries</h2>
<div id="series-container" class="container"></div>

<!-- Modal -->
<div id="modal" class="modal hidden">
  <div class="modal-content">

    <span id="close">&times;</span>

    <img id="modal-img">

    <div class="modal-info">
      <h2 id="modal-title"></h2>

      <div class="modal-extra">
        <span id="modal-rating"></span>
        <span id="modal-date"></span>
      </div>

      <p id="modal-desc"></p>

      <!-- 🔥 TRAILER -->
      <iframe id="modal-trailer"
        width="100%"
        height="200"
        frameborder="0"
        allowfullscreen>
      </iframe>

      <button id="modal-fav">❤️ Favoritar</button>
    </div>

  </div>
</div>

<script src="filme.js" defer></script>
</body>
</html>
